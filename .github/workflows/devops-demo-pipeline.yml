name: DevOps-demo - Build,Push & Deploy

on: 
 push:
   branches: [main]
   paths: 
   -'devops-demo-app/**'
   -'.github/workflows/devops-demo-pipeline.yml'
 Pull_request:
   branches: [main]
   paths: 
   -'devops-demo-app/**'
   -'.github/workflows/devops-demo-pipeline.yml'
workflow_dispatch:

env:
DOCKER_IMAGE: ${{secrets.DOCKERHUB_USERNAME}}/devops-demo-app
AZURE_WEBAPP_NAME: devops-demo-app

jobs: 
 build: 
  name: Build & Test 
  runs-on: ubuntu-latest
  defaults:
   runs:
    working-directory: devops-demo-app
    
steps: 
 -name: checkout code
 uses: actions/checkout@v4

 -name: Set up JDK 17
 uses: actions/setup-java@v4
 with:
 java-version: '17'
 distribution: 'temurin'
 cache: maven

 -name: Build with Maven
 run: mvn clean package -B
 -name: run tests
 run: mvn test -B

 -name: upload artifact
 uses: actions/upload-artifact@v4
 with:
  name: app-jar
  path: devops-demo-app/target/*.jar
  
 
 
 
 
 
 
 
 
    
  
  
  
  


   
 
   
   

