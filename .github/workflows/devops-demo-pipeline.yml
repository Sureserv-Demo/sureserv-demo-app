name: DevOps-demo - Build,Push & Deploy

on: 
  push:
    branches: [main]
    paths: 
      - 'devops-demo-app/**'
      - '.github/workflows/devops-demo-pipeline.yml'
   # Pull_request: 
   #   branches: [main]
   #   paths: 
   #     - 'devops-demo-app/**'
   #     - '.github/workflows/devops-demo-pipeline.yml'
  workflow_dispatch:

env:
  DOCKER_IMAGE: vijayhgs/devops-demo-app
  AZURE_WEBAPP_NAME: devops-demo-app

jobs: 
  build: 
    name: Build & Test 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devops-demo-app
    
    steps: 
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B
        
      - name: Run tests
        run: mvn test -B

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: devops-demo-app/target/*.jar

  docker: 
    name: Build & Push Docker Image  
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3
  
      - name: login to Dockerhub
        uses: docker/login-action@v3
        with: 
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}
  
      - name: Build & Push Docker image 
        uses: docker/build-push-action@v5
        with:
          context: devops-demo-app
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  deploy: 
    name: Deploy to Azure  Web App
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps: 
      - name: login to Azure
        uses: azure/login@V2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS}}
  
      - name: Deploy to Azure web app
        uses: azure/webapps-deploy@V3
        with: 
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          images: ${{ vars.DOCKER_IMAGE }}:${{ github.sha }}
  
      - name: Azure logout
        run: az logout
        if: always()
        
       
       
     
     
     
     
  
  
   
   
   



  
 
 
 
 
 
 
 
 
    
  
  
  
  


   
 
   
   

